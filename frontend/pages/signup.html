<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign Up — ResumeIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{--fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--r:14px;--rs:8px;--ac:#7c6af7;--ac2:#a89cf7;--acd:rgba(124,106,247,.12);}
[data-theme="dark"]{--bg:#07070d;--bg2:#0e0e18;--bg3:#15151f;--card:#1a1a26;--b:#222235;--b2:#2c2c42;--tx:#eaeaf5;--tx2:#8484a8;--tx3:#42425a;--gr:#3ecf8e;--re:#f87171;--red:rgba(248,113,113,.1);--shadow:rgba(0,0,0,.4);}
[data-theme="light"]{--bg:#f5f5fc;--bg2:#ffffff;--bg3:#eeeef8;--card:#ffffff;--b:#ddddf0;--b2:#c8c8e8;--tx:#1a1a2e;--tx2:#555580;--tx3:#9090b8;--gr:#1a9e62;--re:#d94040;--red:rgba(217,64,64,.08);--shadow:rgba(0,0,0,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;}
[data-theme="dark"] body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(124,106,247,.07),transparent 66%);pointer-events:none;z-index:0;}

nav{display:flex;align-items:center;gap:14px;padding:0 28px;height:60px;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100;}
.nlogo{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:-1px;color:var(--tx);text-decoration:none;}
.nlogo span{color:var(--ac2);}
.nlinks{margin-left:auto;display:flex;gap:8px;}
.nlink{padding:7px 15px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;border:none;background:none;font-family:var(--fb);text-decoration:none;transition:all .2s;}
.nlink:hover{color:var(--tx);background:var(--bg3);}
.nlink.pri{background:var(--ac);color:#fff;}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
.card{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:38px 36px;width:100%;max-width:440px;box-shadow:0 8px 40px var(--shadow);}
.card-title{font-family:var(--fd);font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
.card-sub{font-size:13px;color:var(--tx2);margin-bottom:28px;line-height:1.6;}

.field{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:var(--tx2);letter-spacing:.5px;margin-bottom:6px;}
input{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);padding:11px 14px;color:var(--tx);font-size:14px;font-family:var(--fb);outline:none;transition:all .2s;}
input:focus{border-color:var(--ac);background:var(--bg2);}
input::placeholder{color:var(--tx3);}
input.err-inp{border-color:var(--re);}
.err-msg{font-size:12px;color:var(--re);margin-top:5px;display:none;}
.err-msg.on{display:block;}

.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;padding:2px;}

/* PASSWORD STRENGTH */
.pw-checks{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px;}
.pwc{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--tx3);transition:color .2s;}
.pwc.ok{color:var(--gr);}
.pwc-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--tx3);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .2s;}
.pwc.ok .pwc-dot{border-color:var(--gr);background:var(--gr);color:#fff;}

/* STRENGTH BAR */
.strength-bar{height:3px;background:var(--b);border-radius:100px;overflow:hidden;margin-top:8px;}
.strength-fill{height:100%;border-radius:100px;transition:width .4s,background .4s;width:0%;}

.btn-main{width:100%;background:var(--ac);color:#fff;border:none;padding:13px;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--fd);transition:all .28s;box-shadow:0 0 30px rgba(124,106,247,.25);margin-top:8px;}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 0 50px rgba(124,106,247,.4);}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--tx3);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b);}
.link-row{text-align:center;font-size:13px;color:var(--tx2);}
.link-row a{color:var(--ac2);text-decoration:none;font-weight:600;}
.link-row a:hover{color:var(--ac);}

.banner{background:var(--red);border:1px solid rgba(248,113,113,.3);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--re);margin-bottom:16px;display:none;animation:fadeUp .25s ease;}
.banner.on{display:block;}
.banner.good{background:rgba(62,207,142,.1);border-color:rgba(62,207,142,.3);color:var(--gr);}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--b2);border-radius:var(--rs);padding:10px 18px;font-size:13px;transition:all .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;box-shadow:0 8px 32px var(--shadow);}
.toast.on{transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <a href="home.html" class="nlogo">Resume<span>IQ</span></a>
  <div class="nlinks">
    <a href="home.html" class="nlink">Home</a>
    <a href="login.html" class="nlink pri">Login</a>
  </div>
</nav>

<main>
  <div class="card">
    <div class="card-title">Create your account ✨</div>
    <div class="card-sub">Free forever. No credit card needed.</div>

    <div class="banner" id="banner"></div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Vaishnavi Pogaku" autocomplete="name"/>
      <div class="err-msg" id="err-name"></div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@gmail.com" autocomplete="email"/>
      <div class="err-msg" id="err-email"></div>
    </div>

    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+91 9876543210" autocomplete="tel"/>
      <div class="err-msg" id="err-phone"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" oninput="onPwInput()"/>
        <button class="pw-eye" onclick="togglePw('password',this)" type="button">👁</button>
      </div>
      <!-- Strength bar -->
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <!-- Rule indicators -->
      <div class="pw-checks">
        <div class="pwc" id="pwc-length"><div class="pwc-dot">✓</div>8+ characters</div>
        <div class="pwc" id="pwc-upper"><div class="pwc-dot">✓</div>Uppercase letter</div>
        <div class="pwc" id="pwc-lower"><div class="pwc-dot">✓</div>Lowercase letter</div>
        <div class="pwc" id="pwc-number"><div class="pwc-dot">✓</div>Number</div>
        <div class="pwc" id="pwc-special"><div class="pwc-dot">✓</div>Special character</div>
      </div>
      <div class="err-msg" id="err-password"></div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password"/>
        <button class="pw-eye" onclick="togglePw('confirm',this)" type="button">👁</button>
      </div>
      <div class="err-msg" id="err-confirm"></div>
    </div>

    <button class="btn-main" id="signupBtn" onclick="doSignup()">Create Account →</button>

    <div class="divider">or</div>
    <div class="link-row">Already have an account? <a href="login.html">Login here</a></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="../js/auth.js"></script>
<script>
(function(){const t=localStorage.getItem('riq-theme');if(t)document.documentElement.dataset.theme=t;})();
if(Auth.isLoggedIn()) window.location.href='analyze.html';

function togglePw(id,btn){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}

// Live password strength indicator
function onPwInput(){
  const pw=document.getElementById('password').value;
  const {score,checks}=Auth.checkPasswordStrength(pw);

  // Update each rule dot
  const map={length:'pwc-length',upper:'pwc-upper',lower:'pwc-lower',number:'pwc-number',special:'pwc-special'};
  for(const[key,id] of Object.entries(map)){
    document.getElementById(id).classList.toggle('ok',checks[key]);
  }

  // Strength bar color
  const fill=document.getElementById('strengthFill');
  const pct=(score/5)*100;
  fill.style.width=pct+'%';
  fill.style.background=score<=2?'var(--re)':score<=3?'#f59e0b':'var(--gr)';
}

function showErr(id,msg){
  const el=document.getElementById('err-'+id);
  if(!el)return;
  el.textContent=msg;el.classList.add('on');
  const inp=document.getElementById(id);
  if(inp)inp.classList.add('err-inp');
}
function clearErrs(){
  ['name','email','phone','password','confirm'].forEach(id=>{
    const el=document.getElementById('err-'+id);
    if(el){el.textContent='';el.classList.remove('on');}
    const inp=document.getElementById(id);
    if(inp)inp.classList.remove('err-inp');
  });
  document.getElementById('banner').classList.remove('on','good');
}
function showBanner(msg,good=false){
  const b=document.getElementById('banner');
  b.textContent=msg;b.classList.toggle('good',good);b.classList.add('on');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),3000);
}

function validateFrontend(){
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const pw=document.getElementById('password').value;
  const confirm=document.getElementById('confirm').value;
  let valid=true;

  if(!name){showErr('name','Please enter your full name.');valid=false;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showErr('email','Please enter a valid email address.');valid=false;}
  if(!phone||phone.replace(/\D/g,'').length<10){showErr('phone','Please enter a valid phone number.');valid=false;}

  const {score,checks}=Auth.checkPasswordStrength(pw);
  if(score<5){
    const missing=[];
    if(!checks.length)missing.push('8+ characters');
    if(!checks.upper)missing.push('uppercase');
    if(!checks.lower)missing.push('lowercase');
    if(!checks.number)missing.push('number');
    if(!checks.special)missing.push('special character');
    showErr('password','Password needs: '+missing.join(', ')+'.');
    valid=false;
  }
  if(pw!==confirm){showErr('confirm','Passwords do not match.');valid=false;}

  return valid;
}

async function doSignup(){
  clearErrs();
  if(!validateFrontend()) return;

  const btn=document.getElementById('signupBtn');
  btn.disabled=true;btn.textContent='Creating account…';

  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const pw=document.getElementById('password').value;
  const confirm=document.getElementById('confirm').value;

  try{
    const res=await Auth.signup(name,email,phone,pw,confirm);
    if(res.success){
      showBanner('Account created! Redirecting to login…',true);
      showToast('Welcome to ResumeIQ!');
      setTimeout(()=>window.location.href='login.html',1200);
    }else{
      showBanner(res.message||'Signup failed. Please try again.');
      btn.disabled=false;btn.textContent='Create Account →';
    }
  }catch(e){
    showBanner('Could not connect to server. Make sure the backend is running.');
    btn.disabled=false;btn.textContent='Create Account →';
  }
}
</script>
</body>
</html>
