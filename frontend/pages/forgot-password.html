<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password — ResumeIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{--fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--rs:8px;--ac:#7c6af7;--ac2:#a89cf7;--acd:rgba(124,106,247,.12);}
[data-theme="dark"]{--bg:#07070d;--bg2:#0e0e18;--bg3:#15151f;--card:#1a1a26;--b:#222235;--b2:#2c2c42;--tx:#eaeaf5;--tx2:#8484a8;--tx3:#42425a;--gr:#3ecf8e;--re:#f87171;--red:rgba(248,113,113,.1);--shadow:rgba(0,0,0,.4);}
[data-theme="light"]{--bg:#f5f5fc;--bg2:#ffffff;--bg3:#eeeef8;--card:#ffffff;--b:#ddddf0;--b2:#c8c8e8;--tx:#1a1a2e;--tx2:#555580;--tx3:#9090b8;--gr:#1a9e62;--re:#d94040;--red:rgba(217,64,64,.08);--shadow:rgba(0,0,0,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;}
[data-theme="dark"] body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(124,106,247,.07),transparent 66%);pointer-events:none;z-index:0;}
nav{display:flex;align-items:center;padding:0 28px;height:60px;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100;}
.nlogo{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:-1px;color:var(--tx);text-decoration:none;}
.nlogo span{color:var(--ac2);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
.card{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:38px 36px;width:100%;max-width:420px;box-shadow:0 8px 40px var(--shadow);}
.card-title{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
.card-sub{font-size:13px;color:var(--tx2);margin-bottom:28px;line-height:1.6;}
.step{display:none;animation:fadeUp .3s ease;}
.step.on{display:block;}
.field{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:var(--tx2);letter-spacing:.5px;margin-bottom:6px;}
input{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);padding:11px 14px;color:var(--tx);font-size:14px;font-family:var(--fb);outline:none;transition:all .2s;}
input:focus{border-color:var(--ac);background:var(--bg2);}
input::placeholder{color:var(--tx3);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;}
.btn-main{width:100%;background:var(--ac);color:#fff;border:none;padding:13px;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--fd);transition:all .28s;box-shadow:0 0 30px rgba(124,106,247,.25);margin-top:4px;}
.btn-main:hover{transform:translateY(-1px);}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.banner{border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;animation:fadeUp .25s ease;}
.banner.on{display:block;}
.banner.err{background:var(--red);border:1px solid rgba(248,113,113,.3);color:var(--re);}
.banner.good{background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);color:var(--gr);}
.back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--ac2);text-decoration:none;}
.back-link:hover{color:var(--ac);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<nav><a href="home.html" class="nlogo">Resume<span>IQ</span></a></nav>

<main>
  <div class="card">
    <!-- Step 1: Enter email -->
    <div class="step on" id="step1">
      <div class="card-title">Reset password 🔑</div>
      <div class="card-sub">Enter your email and set a new password.</div>
      <div class="banner" id="banner1"></div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="resetEmail" placeholder="you@gmail.com"/>
      </div>
      <div class="field">
        <label>New Password</label>
        <div class="pw-wrap">
          <input type="password" id="newPw" placeholder="New strong password"/>
          <button class="pw-eye" onclick="togglePw('newPw',this)" type="button">👁</button>
        </div>
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPw" placeholder="Re-enter password"/>
          <button class="pw-eye" onclick="togglePw('confirmPw',this)" type="button">👁</button>
        </div>
      </div>
      <button class="btn-main" id="resetBtn" onclick="doReset()">Reset Password →</button>
      <a href="login.html" class="back-link">← Back to login</a>
    </div>

    <!-- Step 2: Success -->
    <div class="step" id="step2">
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:48px;margin-bottom:16px;">✅</div>
        <div class="card-title" style="margin-bottom:8px;">Password reset!</div>
        <div style="font-size:13px;color:var(--tx2);margin-bottom:24px;">Your password has been updated successfully.</div>
        <a href="login.html" class="btn-main" style="display:inline-block;text-decoration:none;width:auto;padding:12px 32px;">Go to Login →</a>
      </div>
    </div>
  </div>
</main>

<script src="../js/auth.js"></script>
<script>
(function(){const t=localStorage.getItem('riq-theme');if(t)document.documentElement.dataset.theme=t;})();

function togglePw(id,btn){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}
function showBanner(msg,good=false){
  const b=document.getElementById('banner1');
  b.textContent=msg;b.className='banner on '+(good?'good':'err');
}

async function doReset(){
  const email=document.getElementById('resetEmail').value.trim();
  const pw=document.getElementById('newPw').value;
  const confirm=document.getElementById('confirmPw').value;

  if(!email){showBanner('Please enter your email.');return;}
  if(pw!==confirm){showBanner('Passwords do not match.');return;}
  const {score}=Auth.checkPasswordStrength(pw);
  if(score<5){showBanner('Password is too weak. Follow all 5 rules.');return;}

  const btn=document.getElementById('resetBtn');
  btn.disabled=true;btn.textContent='Resetting…';

  try{
    const res=await Auth.resetPassword(email,pw,confirm);
    if(res.success){
      document.getElementById('step1').classList.remove('on');
      document.getElementById('step2').classList.add('on');
    }else{
      showBanner(res.message||'Reset failed.');
      btn.disabled=false;btn.textContent='Reset Password →';
    }
  }catch{
    showBanner('Could not connect to server.');
    btn.disabled=false;btn.textContent='Reset Password →';
  }
}
</script>
</body>
</html>
